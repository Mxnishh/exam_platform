{% extends "core/base.html" %}

{% block content %}

<h2 class="mb-4">Add Questions - {{ exam.title }}</h2>

<div class="card shadow-sm p-4 mb-4">

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Question</label>
<input type="text" name="question" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Option 1</label>
<input type="text" name="option1" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Option 2</label>
<input type="text" name="option2" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Option 3</label>
<input type="text" name="option3" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Option 4</label>
<input type="text" name="option4" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Correct Option</label>

<select name="correct_option" class="form-select" required>
<option value="1">Option 1</option>
<option value="2">Option 2</option>
<option value="3">Option 3</option>
<option value="4">Option 4</option>
</select>

</div>

<button type="submit" class="btn btn-primary">
Add Question
</button>

<a href="{% url 'instructor_dashboard' %}" class="btn btn-secondary">
Back
</a>

</form>

</div>

<h4 class="mb-3">Existing Questions</h4>

<div class="card shadow-sm p-3">

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>#</th>
<th>Question</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for question in questions %}

<tr>

<td>{{ forloop.counter }}</td>

<td>{{ question.text }}</td>

<td>

<a href="{% url 'edit_question' question.id %}" class="btn btn-sm btn-warning">
Edit
</a>

<a href="{% url 'delete_question' question.id %}" class="btn btn-sm btn-danger">
Delete
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">No questions added yet.</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
